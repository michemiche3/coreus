# Build onefile, then deploy static content to GitHub Pages
name: Build and Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-onefile:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.deploy_check.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build coreus-onefile.html
        run: python build.py

      - name: Commit onefile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coreus-onefile.html
          git diff --cached --quiet || git commit -m "Auto-build coreus-onefile.html"
          git push

      - name: Determine if deploy is needed
        id: deploy_check
        run: |
          # compare files changed between previous commit and current
          before=${{ github.event.before }}
          after=${{ github.sha }}
          echo "Checking diff $before..$after"
          files=$(git diff --name-only "$before" "$after" || true)
          echo "Changed files:\n$files"
          if echo "$files" | grep -E '^(index.html|coreus-onefile.html|assets/)' >/dev/null; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: build-onefile
    if: ${{ needs.build-onefile.outputs.deploy == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: build-onefile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure onefile exists
        run: |
          if [ ! -f coreus-onefile.html ]; then
            echo "coreus-onefile.html not found, rebuilding..."
            python3 build.py
          else
            echo "coreus-onefile.html present"
          fi

      - name: Compute next v2.* tag
        id: compute_version
        run: |
          git fetch --tags
          last_tag=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' refs/tags | grep -E '^v2\.[0-9]+$' | head -n1 || true)
          if [ -z "$last_tag" ]; then
            next_tag="v2.1"
          else
            n=$(echo "$last_tag" | sed -E 's/^v2\.([0-9]+)$/\1/')
            next=$((n+1))
            next_tag="v2.$next"
          fi
          echo "next_tag=$next_tag" >> $GITHUB_OUTPUT
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT
          echo "Computed next tag: $next_tag (last_tag: $last_tag)"

      - name: Get changelog from last commit message
        id: get_changelog
        run: |
          changelog=$(git log -1 --pretty='%B')
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if coreus-onefile.html changed since last v2.* tag
        id: check_changed
        run: |
          last_tag="${{ steps.compute_version.outputs.last_tag }}"
          if [ -z "$last_tag" ]; then
            echo "No previous v2.* tag found; will create release."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Comparing coreus-onefile.html between $last_tag and HEAD"
          if git diff --name-only "$last_tag" HEAD -- coreus-onefile.html | grep -q '.'; then
            echo "coreus-onefile.html changed since $last_tag"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "coreus-onefile.html unchanged since $last_tag"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Abort release if onefile unchanged
        if: ${{ steps.check_changed.outputs.changed == 'false' }}
        run: |
          echo "Skipping release: coreus-onefile.html unchanged since last v2.* tag (${ { steps.compute_version.outputs.last_tag } })."
          echo "No release created."

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.compute_version.outputs.next_tag }}
          release_name: ${{ steps.compute_version.outputs.next_tag }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coreus-onefile.html as release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./coreus-onefile.html
          asset_name: coreus-onefile.html
          asset_content_type: text/html
