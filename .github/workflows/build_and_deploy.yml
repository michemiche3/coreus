# Build onefile, then deploy static content to GitHub Pages
name: Build and Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-onefile:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.deploy_check.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build coreus-onefile.html
        run: python build.py

      - name: Commit onefile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coreus-onefile.html
          
          # Get previous commit message
          PREV_MSG=$(git log -1 --format="%s" ${{ github.event.before }})
          
          git diff --cached --quiet || git commit -m "chore: build onefile [$PREV_MSG]"
          git push

      - name: Determine if deploy is needed
        id: deploy_check
        run: |
          # compare files changed between previous commit and current
          before=${{ github.event.before }}
          after=${{ github.sha }}
          echo "Checking diff $before..$after"
          files=$(git diff --name-only "$before" "$after" || true)
          echo "Changed files:\n$files"
          if echo "$files" | grep -E '^(index.html|coreus-onefile.html|assets/)' >/dev/null; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: build-onefile
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
